<!DOCTYPE html>
<html>
<head>
    <title>FamStream | The Family Hub</title>
    <style>
        /* BASE DESIGN */
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        /* THE INPUT CARD */
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; border-top: 6px solid #4a90e2; margin-bottom: 20px; }
        #mainApp, #loginScreen { display: none; }
        
        input, select { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; background-color: #4a90e2; color: white; border: none; padding: 15px; margin-top: 20px; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }

        /* THE PROFESSIONAL CATEGORY BUTTONS */
        .filter-group { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 500px; margin: 20px 0; }
        .filter-btn { 
            background: #fff; 
            border: 2px solid #4a90e2; 
            color: #4a90e2; 
            padding: 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 800; 
            font-size: 18px; 
            letter-spacing: 1px;
            text-align: center;
            transition: 0.3s;
        }
        .filter-btn:hover, .filter-btn.active { background: #4a90e2; color: white; transform: translateY(-2px); }

        /* THE GALLERY GRID */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; margin-top: 30px; }
        .event-card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .media-box { width: 100%; height: 200px; background: #000; }
        iframe, video { width: 100%; height: 100%; border: none; }
        .info { padding: 20px; text-align: left; border-left: 5px solid #2ecc71; }
        .type-tag { font-size: 11px; color: #95a5a6; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body onload="initApp()">

    <!-- 1. LOGIN SCREEN -->
    <div id="loginScreen" class="container">
        <h2>FamStream Login</h2>
        <input type="password" id="familyPass" placeholder="Enter family2024">
        <button onclick="checkPassword()">Access the Vault</button>
    </div>

    <!-- 2. MAIN APP HUB -->
    <div id="mainApp" style="width: 100%; text-align: center; display: flex; flex-direction: column; align-items: center;">
        <div class="container">
            <h2>Add to Hub</h2>
            <input type="text" id="eventName" placeholder="Ceremony Name (e.g. Grandma's 80th)">
            <select id="eventType">
                <option value="Wedding">Wedding</option>
                <option value="Funeral">Funeral</option>
                <option value="Birthday">Birthday</option>
                <option value="Gathering">Family Gathering</option>
                <option value="Graduation">Graduation</option>
            </select>
            <input type="text" id="mediaUrl" placeholder="Video filename or VDO link">
            <button onclick="addEvent()">Save & Broadcast</button>
        </div>

        <!-- CATEGORY NAVIGATION -->
        <div class="filter-group">
            <button class="filter-btn active" onclick="filterBy('All', this)">All Memories</button>
            <button class="filter-btn" onclick="filterBy('Wedding', this)">Weddings</button>
            <button class="filter-btn" onclick="filterBy('Funeral', this)">Funerals</button>
            <button class="filter-btn" onclick="filterBy('Birthday', this)">Birthdays</button>
            <button class="filter-btn" onclick="filterBy('Gathering', this)">Family Gatherings</button>
            <button class="filter-btn" onclick="filterBy('Graduation', this)">Graduations</button>
        </div>

        <div id="displayArea" class="gallery-grid"></div>
    </div>

    <script>
        function initApp() { document.getElementById('loginScreen').style.display = "block"; }

        function checkPassword() {
            if (document.getElementById('familyPass').value === "family2024") {
                document.getElementById('loginScreen').style.display = "none";
                document.getElementById('mainApp').style.display = "flex";
                loadMemories();
            } else { alert("Wrong code!"); }
        }

        function addEvent() {
            var n = document.getElementById('eventName').value;
            var t = document.getElementById('eventType').value;
            var m = document.getElementById('mediaUrl').value;
            if(!n || !m) return alert("Please fill in the fields!");

            var saved = JSON.parse(localStorage.getItem('famHub')) || [];
            saved.push({ id: Date.now(), name: n, type: t, media: m });
            localStorage.setItem('famHub', JSON.stringify(saved));
            
            loadMemories();
            document.getElementById('eventName').value = "";
            document.getElementById('mediaUrl').value = "";
        }

        function loadMemories(filter = 'All') {
            var area = document.getElementById('displayArea');
            area.innerHTML = "";
            var saved = JSON.parse(localStorage.getItem('famHub')) || [];
            
            saved.forEach(e => {
                if (filter === 'All' || e.type === filter) {
                    var card = document.createElement('div');
                    card.className = 'event-card';
                    
                    // Smart Player: Checks for Live link or Video file
                    var mediaHtml = e.media.includes('vdo.ninja') 
                        ? `<iframe src="${e.media}&autoplay=1" allow="camera;microphone"></iframe>`
                        : `<video controls><source src="${e.media}"></video>`;

                    card.innerHTML = `
                        <div class="media-box">${mediaHtml}</div>
                        <div class="info">
                            <span class="type-tag">${e.type}</span>
                            <h4 style="margin: 5px 0 0 0;">${e.name}</h4>
                        </div>`;
                    area.appendChild(card);
                }
            });
        }

        function filterBy(category, btn) {
            let btns = document.getElementsByClassName('filter-btn');
            for(let b of btns) b.classList.remove('active');
            btn.classList.add('active');
            loadMemories(category);
        }
    </script>
</body>
</html>
