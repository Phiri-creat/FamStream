<!DOCTYPE html>
<html>
<head>
    <title>FamStream | Unified Hub</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); width: 100%; max-width: 600px; margin-bottom: 20px; border-top: 6px solid #4a90e2; }
        #mainApp, #loginScreen { display: none; width: 100%; }
        
        /* FORM STYLING */
        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-weight: bold; font-size: 14px; color: #34495e; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-primary { width: 100%; background: #4a90e2; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* TABS */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: #dce4ec; border-radius: 20px; font-weight: bold; color: #7f8c8d; }
        .tab-btn.active { background: #4a90e2; color: white; }

        /* CALENDAR & GRID */
        .view-section { display: none; width: 100%; max-width: 1200px; }
        .view-section.active { display: block; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 3px 10px rgba(0,0,0,0.05); position: relative; }
        .media-prev { width: 100%; height: 180px; background: #000; display: flex; align-items: center; justify-content: center; }
        .media-prev img, .media-prev video { width: 100%; height: 100%; object-fit: cover; }
        .card-content { padding: 15px; border-left: 4px solid #2ecc71; }
        .tag { font-size: 10px; font-weight: bold; color: #95a5a6; text-transform: uppercase; }
        .delete-x { position: absolute; top: 5px; right: 5px; background: rgba(231,76,60,0.8); color: white; border: none; border-radius: 50%; cursor: pointer; }

        /* CALENDAR SPECIFIC */
        .calendar-list { background: white; border-radius: 10px; padding: 15px; }
        .event-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; align-items: center; }
        .event-date { background: #4a90e2; color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body onload="initApp()">

    <div id="loginScreen" class="container" style="display:block; text-align:center;">
        <h2>FamStream Login</h2>
        <input type="password" id="pass" placeholder="Family Code">
        <button class="btn-primary" onclick="login()">Enter Hub</button>
    </div>

    <div id="mainApp" style="display:none; flex-direction:column; align-items:center;">
        <!-- INPUT FORM -->
        <div class="container">
            <h2 id="formTitle">Add Memory or Schedule Event</h2>
            <div class="input-group">
                <label>Title</label>
                <input type="text" id="title" placeholder="Graduation 2024, Family Dinner, etc.">
            </div>
            <div class="input-group">
                <label>Category</label>
                <select id="cat">
                    <option>Family Gathering</option>
                    <option>Graduation</option>
                    <option>Wedding</option>
                    <option>Funeral</option>
                    <option>Birthday</option>
                    <option>Memory</option>
                </select>
            </div>
            <div class="input-group">
                <label>Date (For Calendar)</label>
                <input type="date" id="eventDate">
            </div>
            <div class="input-group">
                <label>Media: URL (Live/YouTube) OR File (Upload)</label>
                <input type="text" id="urlInput" placeholder="Link here...">
                <input type="file" id="fileInput" accept="image/*,video/*">
            </div>
            <button class="btn-primary" onclick="saveData()">Post & Sync</button>
        </div>

        <!-- NAVIGATION TABS -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('stream', this)">Stream Hub</button>
            <button class="tab-btn" onclick="showTab('calendar', this)">Event Schedule</button>
        </div>

        <!-- STREAM VIEW -->
        <div id="stream" class="view-section active">
            <div id="mediaGrid" class="gallery-grid"></div>
        </div>

        <!-- CALENDAR VIEW -->
        <div id="calendar" class="view-section">
            <div class="calendar-list" id="calendarList"></div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('famStreamDB')) || [];

        function initApp() { console.log("System Ready"); }

        function login() {
            if(document.getElementById('pass').value === "family2024") {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'flex';
                render();
            } else { alert("Access Denied"); }
        }

        async function saveData() {
            const title = document.getElementById('title').value;
            const category = document.getElementById('cat').value;
            const date = document.getElementById('eventDate').value;
            const url = document.getElementById('urlInput').value;
            const file = document.getElementById('fileInput').files[0];

            if(!title) return alert("Title required");

            let mediaSrc = url;
            let mediaType = "link";

            // If file is uploaded, convert to Base64 for local storage demo 
            // (Note: localStorage has size limits, normally we'd use a server)
            if(file) {
                mediaType = file.type.startsWith('image') ? 'image' : 'video';
                mediaSrc = await toBase64(file);
            }

            db.push({ id: Date.now(), title, category, date, mediaSrc, mediaType });
            localStorage.setItem('famStreamDB', JSON.stringify(db));
            render();
            resetForm();
        }

        const toBase64 = file => new Promise((res, rej) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => res(reader.result);
            reader.onerror = error => rej(error);
        });

        function render() {
            const grid = document.getElementById('mediaGrid');
            const cal = document.getElementById('calendarList');
            grid.innerHTML = "";
            cal.innerHTML = "<h3>Scheduled Events</h3>";

            // Sort by date for calendar
            const sortedDb = [...db].sort((a,b) => new Date(a.date) - new Date(b.date));

            db.forEach(item => {
                // Media Card
                const card = document.createElement('div');
                card.className = 'card';
                let mediaHtml = `<div class="media-prev"><p style="color:white">Live Link</p></div>`;
                
                if(item.mediaType === 'image') mediaHtml = `<div class="media-prev"><img src="${item.mediaSrc}"></div>`;
                else if(item.mediaType === 'video') mediaHtml = `<div class="media-prev"><video controls src="${item.mediaSrc}"></video></div>`;
                else if(item.mediaSrc.includes('youtube')) {
                    let id = item.mediaSrc.split('v=')[1] || item.mediaSrc.split('/').pop();
                    mediaHtml = `<div class="media-prev"><iframe src="https://youtube.com{id}"></iframe></div>`;
                }

                card.innerHTML = `${mediaHtml}<button class="delete-x" onclick="remove(${item.id})">×</button>
                    <div class="card-content"><span class="tag">${item.category}</span><h4>${item.title}</h4></div>`;
                grid.appendChild(card);

                // Calendar Entry
                if(item.date) {
                    const row = document.createElement('div');
                    row.className = 'event-item';
                    row.innerHTML = `<span class="event-date">${item.date}</span> <strong>${item.title}</strong> <span>${item.category}</span>`;
                    cal.appendChild(row);
                }
            });
        }

        function remove(id) {
            db = db.filter(i => i.id !== id);
            localStorage.setItem('famStreamDB', JSON.stringify(db));
            render();
        }

        function showTab(id, btn) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function resetForm() {
            document.getElementById('title').value = "";
            document.getElementById('urlInput').value = "";
            document.getElementById('fileInput').value = "";
        }
    </script>
</body>
</html>
